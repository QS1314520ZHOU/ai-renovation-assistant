version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: renovation_db
    restart: always
    environment:
      POSTGRES_USER: renovation
      POSTGRES_PASSWORD: renovation2024
      POSTGRES_DB: renovation_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renovation"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: renovation_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build: .
    container_name: renovation_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./app:/code/app

volumes:
  pgdata:
  redisdata:
